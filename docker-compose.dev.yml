name: matrix-builder-dev

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env.example
    environment:
      APP_ENV: development
      AGENT_GENERATOR_MODE: mock
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app/services/api
      - ./scripts:/app/scripts
      - ./.local/bundles:/tmp/matrix-builder/bundles
    depends_on:
      - postgres
      - redis
      - minio

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: .env.example
    environment:
      APP_ENV: development
    volumes:
      - ./workers:/app/workers
      - ./.local/bundles:/tmp/matrix-builder/bundles
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matrix_builder
      POSTGRES_USER: matrix_builder
      POSTGRES_PASSWORD: matrix_builder_dev_password
    ports:
      - "5432:5432"
    volumes:
      - matrix_builder_dev_postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: matrix_builder
      MINIO_ROOT_PASSWORD: matrix_builder_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - matrix_builder_dev_minio:/data

volumes:
  matrix_builder_dev_postgres:
  matrix_builder_dev_minio:
