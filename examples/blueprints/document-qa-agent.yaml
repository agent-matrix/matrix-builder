schema_version: 1
blueprint_id: mb_example_document_qa_agent_standard
name: Document Q&A Agent
slug: document-qa-agent
quality_level: standard
idea: Upload documents, ask questions, and return cited answers.
stack:
  frontend: nextjs
  backend: fastapi
  worker: python
  database: sqlite
required_files:
  - README.md
  - MATRIX_BLUEPRINT.yaml
  - MATRIX_STANDARDS.lock
  - MATRIX_ALLOWED_CHANGES.md
  - docs/security.md
allowed_change_roots:
  - frontend/
  - backend/
  - worker/
  - tests/
forbidden_changes:
  - MATRIX_BLUEPRINT.yaml
  - MATRIX_STANDARDS.lock
  - .github/workflows/
tasks:
  - id: TASK-001
    title: Implement document upload and extraction boundary
    allowed_files:
      - backend/app/api/documents.py
      - backend/tests/test_documents_api.py
  - id: TASK-002
    title: Implement cited answer response UI
    allowed_files:
      - frontend/app/ask/page.tsx
      - frontend/components/citation-list.tsx
validation_commands:
  - ruff check backend/
  - pytest -q
  - npm run build
