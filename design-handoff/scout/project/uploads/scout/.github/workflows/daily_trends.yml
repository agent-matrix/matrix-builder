name: daily trends
on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'
jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/generate_snapshot.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets
          git commit -m "Update Scout trend snapshot" || echo "No changes"
          git push || true
