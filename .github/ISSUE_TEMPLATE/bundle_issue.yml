name: Matrix Bundle issue
description: Report a matrix bundle issue for Matrix Builder
title: "[Matrix Bundle issue] "
labels: [triage]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened or what do you need?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include bundle id, coder, validation report, or screenshots if relevant.
    validations:
      required: false
