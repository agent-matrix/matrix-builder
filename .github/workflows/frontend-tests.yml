# Generated in Batch 1. Keep permissions least-privilege and protect workflow edits with CODEOWNERS.

name: Frontend Checks

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check_frontend.mjs
