# Generated in Batch 1. Keep permissions least-privilege and protect workflow edits with CODEOWNERS.

name: Backend Tests

on:
  pull_request:
    paths:
      - 'services/api/**'
      - 'tests/**'
      - 'scripts/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'pytest.ini'

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
      - name: Install PostgreSQL (RLS/DB tests)
        run: sudo apt-get update && sudo apt-get install -y postgresql
      - run: uv pip install --system -r requirements.txt
      - run: PYTHONPATH=services/api:. python -m pytest services/api/tests -q
