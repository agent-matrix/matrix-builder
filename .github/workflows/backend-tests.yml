# Generated in Batch 1. Keep permissions least-privilege and protect workflow edits with CODEOWNERS.

name: Backend Tests

on:
  pull_request:
    paths:
      - 'services/api/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'pytest.ini'

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip pytest fastapi httpx pydantic uvicorn
      - run: PYTHONPATH=services/api pytest services/api/tests tests/contract -q
