# CI: full Python + frontend checks. Keep permissions least-privilege; protect with CODEOWNERS.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: Install PostgreSQL (RLS/DB tests)
        run: sudo apt-get update && sudo apt-get install -y postgresql
      - name: Install Python dependencies (uv)
        run: uv pip install --system -r requirements.txt
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Tests (services + api + workers, incl. Postgres RLS)
        run: make test
      - name: Lint (repo structure, secrets, style, contracts, frontend)
        run: make lint
      - name: Frontend typecheck
        run: pnpm --filter @ruslanmv/matrix-builder-web typecheck
