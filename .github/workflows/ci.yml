# Generated in Batch 1. Keep permissions least-privilege and protect workflow edits with CODEOWNERS.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest fastapi httpx pydantic uvicorn
      - name: Run tests
        run: make test
      - name: Run lint
        run: make lint
