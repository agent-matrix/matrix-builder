name: migrate-neon

# Apply database migrations to Neon (or any Postgres in DATABASE_URL).
#
# "Only if needed": `alembic upgrade head` is idempotent — it applies just the
# revisions that aren't in the target DB yet, and is a no-op when already current.
#
# Required GitHub repository SECRET (Settings → Secrets and variables → Actions):
#   DATABASE_URL   the Neon connection string, e.g.
#     postgresql://neondb_owner:PW@ep-proud-lake-...neon.tech/neondb?sslmode=require
#
# GitHub runners can reach Neon on 5432 (your sandbox/Space may not).
# Runs automatically when a migration changes, or manually via "Run workflow".

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - "services/api/migrations/**"
      - ".github/workflows/migrate-neon.yml"

permissions:
  contents: read

concurrency:
  group: migrate-neon
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check DATABASE_URL is set
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::Repo secret DATABASE_URL is not set (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          echo "::add-mask::$DATABASE_URL"

      - name: Show pending migrations
        working-directory: services/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Current revision in DB:"; PYTHONPATH=. python -m alembic current || true
          echo "Latest revision in repo:"; PYTHONPATH=. python -m alembic heads

      - name: Apply migrations (alembic upgrade head — only if needed)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash scripts/migrate.sh

      - name: Confirm DB is at head
        working-directory: services/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: PYTHONPATH=. python -m alembic current
