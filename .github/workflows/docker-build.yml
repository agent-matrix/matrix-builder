name: Docker Build
on: [pull_request]
permissions: { contents: read, packages: write }
jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f services/api/Dockerfile -t matrix-builder-api:ci .
      - run: docker build -f workers/Dockerfile -t matrix-builder-worker:ci .
